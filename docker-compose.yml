# Dev environment için tek komutla tüm stack:
#   docker compose up -d
#
# Servisler:
#   - api     → SearchConsoleApp.Web (.NET 9 backend)            :5000
#   - sql     → SQL Server 2022                       :1433
#   - redis   → Redis 7                               :6379
#   - seq     → Serilog log explorer (UI)             :5341/:8081
#   - mailpit → SMTP test sunucusu + web UI           :1025/:8025
#
# Production'da bu dosya kullanılmaz — `docker-compose.prod.yml` veya
# k8s manifest'lerine geçiş yapılır.

services:
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: SearchConsoleApp-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "DevPassword!2024"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'DevPassword!2024' -No -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: SearchConsoleApp-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Serilog log explorer — JSON log'ları görsel sorgulanabilir
  # Web UI: http://localhost:8081
  seq:
    image: datalust/seq:latest
    container_name: SearchConsoleApp-seq
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "5341:5341"   # ingestion
      - "8081:80"     # web UI
    volumes:
      - seq-data:/data

  # SMTP test sunucusu — gerçek email göndermeden test
  # Web UI: http://localhost:8025
  mailpit:
    image: axllent/mailpit:latest
    container_name: SearchConsoleApp-mailpit
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # web UI

  # Jaeger distributed tracing
  # Web UI: http://localhost:16686
  # OTLP: gRPC 4317, HTTP 4318
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: SearchConsoleApp-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # web UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP

  crawl-worker:
    build:
      context: ./crawl-worker
      dockerfile: Dockerfile
    container_name: SearchConsoleApp-crawl-worker
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      REDIS_URL: "redis://redis:6379"
      API_WEBHOOK_URL: "http://api:8080/api/v1/public/audit/webhook"
      PRODUCT_COMPLIANCE_WEBHOOK_URL: "http://api:8080/api/v1/public/merchant-center/compliance/webhook"
      AUDIT_WEBHOOK_SECRET: ${AUDIT_WEBHOOK_SECRET:-}
      RULES_DIR: "/docs/seo-rules"
      PORT: "3100"
      FETCH_DELAY_MS: "300"
      CRAWL_CONCURRENCY: "3"
      PLAYWRIGHT_ENABLED: "true"
      PLAYWRIGHT_MAX_PAGES: "10"
    ports:
      - "3100:3100"
    volumes:
      - ./docs/seo-rules:/docs/seo-rules:ro

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: SearchConsoleApp-api
    depends_on:
      sql:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
      seq:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"

      ConnectionStrings__Default: "Server=sql;Database=SearchConsoleApp;User Id=sa;Password=DevPassword!2024;TrustServerCertificate=True"

      Cache__Provider: "redis"
      Cache__Redis__ConnectionString: "redis:6379"

      # Mailpit'e gönder — gerçek email gitmez
      Email__Mode: "smtp"
      Email__Smtp__Host: "mailpit"
      Email__Smtp__Port: "1025"
      Email__Smtp__EnableSsl: "false"
      Email__Smtp__FromEmail: "noreply@SearchConsoleApp.local"

      # Serilog → Seq'e stream
      Serilog__WriteTo__0__Name: "Seq"
      Serilog__WriteTo__0__Args__serverUrl: "http://seq:5341"

      # OpenTelemetry → Jaeger
      Observability__OtlpEndpoint: "http://jaeger:4317"
      Observability__SampleRate: "1.0"   # dev'de tüm trace'ler

      App__PublicUrl: "http://localhost:4200"
      Jwt__Key: "DEV_ONLY_jwt_key_change_in_production_at_least_32_chars_long"
      Audit__CrawlWorkerUrl: "http://crawl-worker:3100"
      Audit__WebhookSecret: ${AUDIT_WEBHOOK_SECRET:-}
      Audit__MaxPages: "50"
      Audit__MaxDepth: "5"
      ProductCompliance__MaxProducts: "100"
      ProductCompliance__MaxAiCallsPerRun: "20"
      Google__MerchantCenter__ClientId: ${GOOGLE_GMC_CLIENT_ID:-}
      Google__MerchantCenter__ClientSecret: ${GOOGLE_GMC_CLIENT_SECRET:-}
      Google__MerchantCenter__RedirectUri: ${GOOGLE_GMC_REDIRECT_URI:-http://localhost:4200/auth/merchant-center/callback}
      Blob__Local__RootPath: "/app/blobs"

      # Google OAuth — .env dosyasından okunur (bkz. .env.example)
      OAuth__google__ClientId: ${OAUTH_GOOGLE_CLIENT_ID:-}
      OAuth__google__ClientSecret: ${OAUTH_GOOGLE_CLIENT_SECRET:-}
      OAuth__google__RedirectUri: ${OAUTH_GOOGLE_REDIRECT_URI:-http://localhost:4200/auth/external/google/callback}
      GoogleSearchConsole__ClientId: ${GOOGLE_SC_CLIENT_ID:-}
      GoogleSearchConsole__ClientSecret: ${GOOGLE_SC_CLIENT_SECRET:-}
      GoogleSearchConsole__RedirectUri: ${GOOGLE_SC_REDIRECT_URI:-http://localhost:4200/auth/search-console/callback}
      Google__GeminiApiKey: ${GOOGLE_GEMINI_API_KEY:-}
      Google__GeminiModel: ${GOOGLE_GEMINI_MODEL:-gemini-2.5-flash}
    ports:
      - "5000:8080"
    volumes:
      - ./src/SearchConsoleApp.Web/App_Data:/app/App_Data

volumes:
  sql-data:
  redis-data:
  seq-data:
